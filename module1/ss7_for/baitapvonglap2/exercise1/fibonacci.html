<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>fibonacci</title>
</head>
<body>
</body>
<script>
    var result = "";
    var startNumber = +prompt("Start number") ;
    if (startNumber == 0) {
        result = "0" +"<br>"+ "1"+"<br>";
        firstNumber = 0;
        secondNumber = 1;
        for (let i = 2; i<1000 ; i++) {
            var thirdNumber;
            thirdNumber = firstNumber + secondNumber;
            result = result + thirdNumber + "<br>";
            firstNumber = secondNumber;
            secondNumber = thirdNumber;
        };

    } else if (startNumber == 1) {
        result = "1" +"<br>"+ "1"+"<br>";
        firstNumber = 1;
        secondNumber = 1;
        for (let i = 2;i<1000; i++) {
            var thirdNumber;
            thirdNumber = firstNumber + secondNumber;
            result = result + thirdNumber + "<br>";
            firstNumber = secondNumber;
            secondNumber = thirdNumber;
        };
    };


    document.write(result);
    console.log(result);



</script>
</html>
