<script>
    for (let i = 1; i <100 ; i++) {

        if ( i%5==0 &i%3==0 ){
            document.write(i+"FizzBizz" + "<br>");
        } else if (i%5==0){
            document.write(i+"Bizz" + "<br>");
        }else if (i%5==0 &i%3==0){
            document.write(i+"Fizz" + "<br>");
        }else {
            document.write(i+"<br>");
        }
        ;

    }
</script>
