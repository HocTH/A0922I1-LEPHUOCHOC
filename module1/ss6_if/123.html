<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator Basic</title>
    <style type="text/css">
        tr td button{
            width: 50px;
            height: 50px;
        }
    </style>
    <script type="application/javascript">
        function calculate(){
            let result=document.getElementById('result').innerText;
            result=eval(result);
            document.getElementById('result').innerText=result;
        }
        function concat(operator){
            let result=document.getElementById('result').innerText;
            result=result+operator;
            document.getElementById('result').innerText=result;
        }
        function clean(){
            let result=document.getElementById('result').innerText;
            result=null;
            document.getElementById('result').innerText=result;
        }


    </script>


</head>
<body>
<table border="1" cellspacing="20">
    <tr>
        <td colspan="4" style="text-align:right;height:50px;">
            <span id="result"></span>
        </td>
    </tr>
    <tr>
        <td><button type="button"onclick="concat('1')">1</button></td>
        <td><button type="button"onclick="concat('2')">2</button></td>
        <td><button type="button"onclick="concat('3')">3</button></td>
        <td><button type="button"onclick="concat('+')">+</button></td>
    </tr>
    <tr>
        <td><button type="button"onclick="concat('4')">4</button></td>
        <td><button type="button"onclick="concat('5')">5</button></td>
        <td><button type="button"onclick="concat('6')">6</button></td>
        <td><button type="button"onclick="concat('-')">-</button></td>
    </tr>
    <tr>
        <td><button type="button"onclick="concat('7')">7</button></td>
        <td><button type="button"onclick="concat('8')">8</button></td>
        <td><button type="button"onclick="concat('9')">9</button></td>
        <td><button type="button"onclick="concat('*')">x</button></td>
    </tr>
    <tr>
        <td><button type="button"onclick="clean()">C</button></td>
        <td><button type="button"onclick="concat('0')">0</button></td>
        <td><button type="button"onclick="calculate()">=</button></td>
        <td><button type="button"onclick="concat('/')">/</button></td
    </tr>
</table>

</body>
</html>
