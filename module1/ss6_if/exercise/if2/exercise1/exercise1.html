<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>F</title>
</head>
<body>
</body>
<script>
    var C = +prompt("Input the celsius")
    var check = !isNaN(C)
    var F
    if(check){
        F = 32 + (C*9/5);
        alert("F: "+F)
    } else{
        alert("Input again")
    };
</script>
