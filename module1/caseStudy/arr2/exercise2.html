<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>pirmeNumber</title>
</head>
<body>
</body>
<SCRIPT>
    var m = +prompt("Input m");
    var n = +prompt("Input n");

    function numberArr(m, n) {
        var arr = [];
        for (let i = 0; i < m; i++) {
            arr[i] = [];
            for (let j = 0; j < n; j++) {
                arr[i][j] = +prompt("Input element in arr")
            }
        }
        ;
        return arr;
    };

    function checkPrime() {
        var arr = numberArr(m, n);
        var count = 0;
        var flag = 1;
        for (let i = 0; i < m; i++) {
            for (let j = 0; j < n; j++) {
                if (arr[i][j] >= 2) {
                    for (let k = 2; k < arr[i][j] - 1; k++) {
                        if (arr[i][j] % k == 0) {
                            flag = 0;
                        }
                    }
                    ;
                    if (flag == 1) {
                        document.write(arr[i][j] + "<br>");
                        count++;
                    }
                }
            }
        }
        document.write("Quanity of prime number: " + count)
    };
    checkPrime()

</SCRIPT>
