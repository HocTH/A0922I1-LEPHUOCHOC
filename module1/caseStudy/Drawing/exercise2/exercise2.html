<script>
    for (let i = 0; i <5 ; i++) {
        for (let j = 0; j <i+1 ; j++) {
            if (j == 0 || i ==1 && j==1||i == 2 && j==2 ||i == 4 ||i == 3 && j==3){
                document.write("*");
            } else {
                document.write("&nbsp&nbsp");
            };
        }
        document.write("<br>");
    };
</script>
