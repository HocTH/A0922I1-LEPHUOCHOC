<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>isoscelesTriangle</title>
</head>
<body>
</body>
<script>
    for (let i = 1; i <=6 ; i++) {
        for (let k = 5; k >i-1 ; k--) {
            document.write("&nbsp&nbsp")
        }
        for (let j = 0; j < i*2-1 ; j++) {
            if (i==1 || i == 6){
                document.write("*")
            } else {
                if ( j==0 || j == i*2-2){
                    document.write("*")
                } else {
                    document.write("&nbsp&nbsp")
                };
            };
        };
        document.write("<br>");
    }
</script>
</html>
