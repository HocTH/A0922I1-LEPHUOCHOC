<script>
    class Circle{
        constructor(radius,color) {
            this.radius = radius;
            this.color = color;
        };
        getRadius = function (){
            return this.radius;
        };
        getArea = function(){
            return Math.PI*Math.pow(this.radius,2)
        }
    };
    let circle1 = new Circle(2);
    let area1 = circle1.getArea();
    alert(area1);
