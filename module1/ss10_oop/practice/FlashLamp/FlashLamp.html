        };
        getEnergy = function () {
            return this.energy;
        };

            if (this.energy > 0) {
                this.energy--
            }
            ;
        };
    };

    class FlashLamp {
        setBattery = function (battery) {
            this.battery = battery;
        };
        getBatteryInfo = function () {
            return this.battery.getEnergy();
        };
        light = function () {
            if (this.status) {
                alert("Lighting");
            } else {
                alert("Not lighting");
            }
        };

            this.status = true;
        };

            this.status = false;
        }

    battery.setEnergy(20);

    flashLamp.light();

    flashLamp.light();
