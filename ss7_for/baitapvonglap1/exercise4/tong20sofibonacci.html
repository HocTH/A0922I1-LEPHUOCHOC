<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>tong20sofibonacci</title>
</head>
<body>
</body>
<script>
    var result = 1;
    var startNumber = +prompt("Start number") ;
    if (startNumber == 0) {
        firstNumber = 0;
        secondNumber = 1;
        for (let i = 2; i<20 ; i++) {
            var thirdNumber;
            thirdNumber = firstNumber + secondNumber;
            result = result + thirdNumber ;
            firstNumber = secondNumber;
            secondNumber = thirdNumber;
        };

    } else if (startNumber == 1) {
        firstNumber = 1;
        secondNumber = 1;
        for (let i = 2; i<20; i++) {
            var thirdNumber;
            thirdNumber = firstNumber + secondNumber;
            result = result + thirdNumber;
            firstNumber = secondNumber;
            secondNumber = thirdNumber;
        };
    };


    document.write(result);
    console.log(result);
</script>
