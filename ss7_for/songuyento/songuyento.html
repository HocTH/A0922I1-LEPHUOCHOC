<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    var quanity =  +prompt("Input number");
    var count = 0;
    var j=2;
    var stringNumber = '';
    while (count < quanity ){
        var checkNumber = j;
        var flag = true;
        if( j < 2){
            flag = false;
        } else {
            for (let i = 2; i <= checkNumber - 1; i++) {
                var h = checkNumber % i == 0;
                if (h) {  flag = false; break;}
            };
        };
        if (flag==true) {
            count += 1;
            stringNumber += checkNumber+"<br>";
        };
        j++;
    };
    document.write(stringNumber);
</script>

</body>
</html>
