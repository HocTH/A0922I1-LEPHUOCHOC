<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>loopinloop</title>
</head>
<body>
</body>
<script>
   let source1 = "<table border='1' width='300' cellspacing='0' cellpadding='3'>";
    for (let i = 1; i <= 10 ;i++ ){
        source1 = source1 +"<tr>"
        for (let j = 1; j <=10 ; j++) {
             source1 = source1 + "<td>"+ i*j +"</td>";
        };
        source1 = source1 + "</tr>";
    }
    source1 = source1 + "</table>"
    document.write(source1);
</script>
</html>
