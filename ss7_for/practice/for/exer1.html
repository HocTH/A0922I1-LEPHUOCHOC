<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The number is</title>
</head>
<body>
<p id="screen"></p>
</body>
<script>
    var text = ""
    for( i = 0; i < 5; i++){
        text += "This number is" + i +"  "+ "<br>";
        console.log(text);
        document.getElementById("screen").innerHTML= text;
    }
</script>
</html>
