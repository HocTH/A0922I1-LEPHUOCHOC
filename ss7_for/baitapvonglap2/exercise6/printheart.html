<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>printHeart</title>
</head>
<body>
<table>
    <tr>
        <td id="triangle1"></td>
        <td id="triangle2" ></td>
    </tr>
</table>
</body>
<script>
    var triangle1= "";
    for (let i1 = 4; i1 < 10 ; i1++) {
        for (let k = 0; k <= 10-i1 ; k++) {
            triangle1 = triangle1 +"&nbsp;&nbsp;";
            // document.write("&nbsp;&nbsp;");
        };
        for (let j1 = 1; j1 <=2*i1-1 ; j1++) {
            triangle1 = triangle1 + "*";
            // document.write("*");
        }
        triangle1 = triangle1 + "<br>";
        // document.write("<br>");
    };
    document.getElementById("triangle1").innerHTML= triangle1;

    var triangle2= "";
    for (let i2 = 4; i2 < 10 ; i2++) {
        for (let k1 = 0; k1 <= 10-i2 ; k1++) {
            triangle2 = triangle2 +"&nbsp;&nbsp;";
        };
        for (let j2 = 1; j2 <=2*i2-1 ; j2++) {
            triangle2 = triangle2 + "*";
        }
        triangle2 = triangle2 + "<br>";
    };
    document.getElementById("triangle2").innerHTML= triangle2;

    for (let i = 20; i >=5 ; i--) {
        for (let k = 0; k <=20-i ; k++) {
            document.write("&nbsp;&nbsp;");
        };
        for (let j = 1; j <=2*i-1 ; j++) {
            document.write("*")
        }
        document.write("<br>");
    };
</script>
</html>
