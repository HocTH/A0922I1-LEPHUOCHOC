<script>
    for (let i = 1; i <=7 ; i++) {
        if (i == 1 || i ==7 ){
            for (let j = 0; j <=21 ; j++) {
                document.write("*");
            }
            document.write("<br>");
        } else {
            document.write("*");
            for (let j = 0; j <=19 ; j++) {
                document.write("&nbsp;&nbsp;");
            };
            document.write("*");
            document.write("<br>");
        };

    };
</script>
