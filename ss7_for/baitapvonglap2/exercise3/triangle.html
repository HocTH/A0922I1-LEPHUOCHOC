<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>triangle</title>
</head>
<body>
</body>
<script>

    for (let j = 1; j <=5 ; j++) {
        for (let i = 0; i <j ; i++) {
            document.write("*");
        }
        document.write("<br>");

    };
    document.write("<br>");

    for (let k = 5; k >=1 ; k--) {
        for (let l = 0; l <k ; l++) {
            document.write("*");
        }
        document.write("<br>");
    };
    document.write("<br>");

    for (let q = 1; q <=5 ; q++) {
        for (let w = 5; w > q; w--) {
            document.write("&nbsp;&nbsp;");
        }
        for (let e = 0; e < q; e++) {
            document.write("*");
        }
        document.write("<br>");
    }
    document.write("<br>");
    for (let k1 = 5; k1 >=1 ; k1--) {
        for (let i1 = 0; i1 <5-k1 ; i1++) {
            document.write("&nbsp;&nbsp;");
        }
        for (let l1 = 0; l1 <k1 ; l1++) {
            document.write("*");
        }
        document.write("<br>");
    };
    document.write("<br>");


</script>

</html>
