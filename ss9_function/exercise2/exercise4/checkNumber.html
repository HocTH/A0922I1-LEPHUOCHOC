<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>checkNumber</title>
</head>
<body>
</body>
<script>
    var num = +prompt("Input number to check");
    function checkNum(num) {
        if (!isNaN(num)){
            alert(true);
        } else {
            alert(false);
        }
    };
    checkNum(num);
</script>
</html>
