<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>positiveInteger</title>
</head>
<body>
</body>
<script>
    var checkNum = +prompt("Input number to check.");
    function check(num) {
        if (Number.isInteger(num) && num>0){
            alert(" Number is " + true);
        } else {
            alert(" Number is " + false);
        }
    };
    check(checkNum);
</script>
</html>
