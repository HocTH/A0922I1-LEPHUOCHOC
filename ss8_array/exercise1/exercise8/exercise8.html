<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>increNumber</title>
</head>
<body>
</body>
<SCRIPT>
    var arrNum = [];
    var i = 0;
    var increNum;
    do {
        var number = +prompt("Input number");
        if (arrNum.indexOf(number) == -1){
            arrNum.push(number);
            i++;
        }
    }while ( i < 10);
    increNum = arrNum.sort().reverse();
    alert("Mang theo thu tu giam dan : "+increNum);
</SCRIPT>
</html>
