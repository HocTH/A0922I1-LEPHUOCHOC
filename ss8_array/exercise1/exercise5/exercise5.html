<script>
    var arrNumbers = [];
    var countNumber = 0;

    for (let i = 0; i < 10; i++) {
        var numbers = +prompt("Input number");
        arrNumbers[i]= numbers;
    };

    for ( let element of arrNumbers){
        if (element <0){
            countNumber+=1;
        }
    };
    alert("So luong so nguyen am trong mang la: "+countNumber);
</script>
