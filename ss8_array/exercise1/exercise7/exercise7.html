<script>
    var arrNum = [];
    var i = 0;
    var numberV = +prompt("Nhap so V");
    do {
        var number = +prompt("Input number");
        if (arrNum.indexOf(number) == -1){
            arrNum.push(number);
            i++;
        }
    }while ( i < 10);
    var locationV = arrNum.indexOf(numberV);
    if (locationV != -1){
        arrNum.splice(locationV,1);
        arrNum.push(0);

    } ;
    alert(arrNum);
</script>
