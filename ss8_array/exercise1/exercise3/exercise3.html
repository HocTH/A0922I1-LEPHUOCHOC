<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>maxNumberandAverage</title>
</head>
<body>
</body>
<script>
    var arrNum = [];
    var i = 0;
    var average;
    do {
        var number = +prompt("Input number");
       if (arrNum.indexOf(number) == -1){
           arrNum.push(number);
           i++;
       }
    }while ( i < 10);
    for (const arrNumKey in arrNum) {
        var max = arrNum[arrNumKey];
        var result = 0;
        result += arrNum[arrNumKey];
        if (max < arrNum[arrNumKey+1]){
            max = arrNumKey[arrNumKey+1];
        }

    };
    console.log(result);
     average = result / arrNum.length;
    alert('So lon nhat trong mang la: '+max);
    alert('Gia tri trung binh cua mang: '+ average);
</script>
</html>
