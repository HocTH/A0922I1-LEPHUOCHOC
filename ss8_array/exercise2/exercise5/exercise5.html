<script>
    var arr0 = [];
    var arr1 = [];
    var i = 0;
    var j = 0;
    var quanityArr = +prompt("Quanity of element in array.")
    do {
        var element = +prompt("Input number");
            arr0.push(element);
           i++;
    }while ( i < quanityArr);
    do {
        var element = +prompt("Input number");
            arr1.push(element);
            j++;
    }while ( j < quanityArr);
    var check = 0;
    for (let k = 0; k <quanityArr ; k++) {
          if (arr0[k] !==  arr1[k]){
              check = 1;
              break;
          }
    };
    if ( check === 0){
        alert('Two arrays is equivalent');
    } else {
        alert('Two arrays is not equivalent');
    };
</script>
