<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>reverseArr</title>
</head>
<body>
</body>
<SCRIPT>
    var arr = [];
    var i = 0;
    var reverseArr;
    var quanityArr = +prompt("Quanity of arr");
    do {
        var element = prompt("Input element");
            arr.push(element);
            i++;
    }while ( i < quanityArr);
    reverseArr = arr.reverse();
    alert("Mang dao nguoc la : "+reverseArr);
</SCRIPT>
</html>
