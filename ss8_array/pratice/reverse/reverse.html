<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>reverse</title>
</head>
<body>
</body>
<script>
    let x = [7,8,9,0,0,2,3,4,3];
    let first = 0;
    let last = x.length-1;
while (first<last){
    let b = x[first];
    x[first] = x[last];
    x[last] = b;
    first++;
    last--;
}
document.write(x);

</script>
</html>
