<script>
    var income = +prompt("Input the income(unit:million)");
    var commission;
    if(income<=100){
        commission = income*0.05;
    } else{
        if(income<=300){
            commission = income*0.1;
        } else{
            if (income>300){
                commission = income*0.15;
            }
        }
    };
    alert( "The commission is "+commission);


</script>
