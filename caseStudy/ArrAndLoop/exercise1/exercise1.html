<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>prefixSums</title>
</head>
<body>
</body>
<script>
    var beforeArr = [];
    var afterArr = [];
    var  arrLength = +prompt("Input Array Length.");
    for (let i = 0; i < arrLength ; i++) {
          beforeArr[i] = +prompt("Input elements in Array")
    };
    for (let i = 0; i < arrLength ; i++) {
        var sum = 0;
        for (let j = 0; j <= i  ; j++) {
            sum += beforeArr[j];
        }
        afterArr[i] = sum;
    }

    document.write(beforeArr+"<br>");
    document.write(afterArr);
</script>
</html>
