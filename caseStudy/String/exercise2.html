<script>
    var string  = prompt("Input the string");
    var newArr =[];
    function check(string) {
        var sortArr = string.split("").sort();
            newArr[0] = sortArr[0];

            if (newArr.indexOf(sortArr[i]) == -1){
                newArr.push(sortArr[i])
            };

        var result = newArr.join("").trim();
        console.log(result);
        console.log(result.length)
    };
    check(string);
</script>
